<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluation Dashboard — Hackneyed Recommender</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #161b22;
    --card-bg: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-secondary: #8b949e;
    --accent: #58a6ff;
    --accent-soft: rgba(88, 166, 255, .12);
    --gradient-start: #58a6ff;
    --gradient-end: #bc8cff;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  .wrapper {
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  /* ---- header ---- */
  header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .back-link {
    font-size: 0.85rem;
    color: var(--text-secondary);
    text-decoration: none;
    padding: .3em .8em;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: color .15s, border-color .15s;
  }
  .back-link:hover { color: var(--text); border-color: var(--accent); }

  /* ---- nav ---- */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    gap: .25rem;
    padding: .35rem;
    margin-bottom: 2.5rem;
  }
  nav a {
    text-decoration: none;
    color: var(--text-secondary);
    padding: .5rem 1rem;
    border-radius: 8px;
    font-size: .85rem;
    font-weight: 500;
    transition: background .15s, color .15s;
  }
  nav a:hover {
    background: var(--accent-soft);
    color: var(--accent);
  }

  /* ---- sections ---- */
  section {
    margin-bottom: 3rem;
  }
  section h2 {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1rem;
    padding-left: .75rem;
    border-left: 3px solid var(--accent);
  }

  /* ---- cards ---- */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    transition: border-color .2s, box-shadow .2s;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(0,0,0,.35);
  }
  .card h3 {
    font-size: .85rem;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: .75rem;
  }

  iframe {
    width: 100%;
    height: 70vh;
    min-height: 400px;
    border: none;
    border-radius: 8px;
    background: #fff;
  }

  /* ---- no-data notice ---- */
  .no-data {
    display: none;
    color: var(--text-secondary);
    font-size: .9rem;
    padding: 3rem 1rem;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .no-data code {
    background: var(--accent-soft);
    padding: .15em .4em;
    border-radius: 4px;
    color: var(--accent);
    font-size: .85em;
  }

  /* ---- responsive ---- */
  @media (max-width: 640px) {
    .wrapper { padding: 1.25rem 1rem; }
    nav { flex-wrap: wrap; }
    header { gap: .75rem; }
  }
</style>
</head>
<body>
<div class="wrapper">

<header>
  <h1>Evaluation Dashboard</h1>
  <a href="/" class="back-link">← Model Playground</a>
</header>

<nav>
  <a href="#prediction-metrics">Prediction Metrics</a>
  <a href="#ranking-metrics">Ranking Metrics</a>
</nav>

<section id="prediction-metrics">
  <h2>Prediction Metrics</h2>
  <div class="card" id="card-rmse">
    <h3>RMSE &amp; MAE Comparison</h3>
    <iframe id="frame-rmse" src="/viz/rmse_mae_comparison.html" title="RMSE and MAE"></iframe>
    <p class="no-data" id="no-rmse">
      No data yet — run <code>uv run hacrecviz</code> to generate this chart.
    </p>
  </div>
</section>

<section id="ranking-metrics">
  <h2>Ranking Metrics</h2>
  <div class="card" id="card-ranking">
    <h3>Precision / Recall / NDCG</h3>
    <iframe id="frame-ranking" src="/viz/ranking_metrics_comparison.html" title="Ranking metrics"></iframe>
    <p class="no-data" id="no-ranking">
      No data yet — run <code>uv run hacrecviz</code> to generate this chart.
    </p>
  </div>
</section>

</div>

<script>
  // Show a "no data" message if an iframe fails to load (e.g. file not yet generated).
  function handleFrameError(frameId, noDataId) {
    const frame = document.getElementById(frameId);
    const notice = document.getElementById(noDataId);
    frame.addEventListener('error', () => {
      frame.style.display = 'none';
      notice.style.display = 'block';
    });
  }
  handleFrameError('frame-rmse', 'no-rmse');
  handleFrameError('frame-ranking', 'no-ranking');
</script>
</body>
</html>
